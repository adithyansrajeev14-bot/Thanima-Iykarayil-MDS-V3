<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THANIMA MDS | Console</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f1f5f9; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; margin: 0; }
        
        /* Centered Compact Login */
        #loginScreen { height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-box { background: var(--card); padding: 25px; border-radius: 12px; width: 100%; max-width: 320px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        
        input { width: 100%; padding: 12px; margin: 10px 0; background: #334155; border: 1px solid #475569; border-radius: 8px; color: white; font-size: 16px; }
        .btn { width: 100%; padding: 12px; background: var(--accent); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

        #mainUI { display: none; padding: 20px; }
    </style>
</head>
<body>

    <!-- Login Section -->
    <div id="loginScreen">
        <div class="login-box">
            <h2 style="margin-bottom:15px; text-align:center;">THANIMA Login</h2>
            <input type="text" id="user" placeholder="Username">
            <input type="password" id="pass" placeholder="Password">
            <button class="btn" onclick="checkLogin()">Login</button>
        </div>
    </div>

    <!-- Main App -->
    <div id="mainUI">
        <h1>Welcome, Admin</h1>
        <button onclick="location.reload()" style="background:transparent; color:red; border:1px solid red; padding:5px;">Logout</button>
    </div>

    <script>
        function checkLogin() {
            const user = document.getElementById('user').value;
            const pass = document.getElementById('pass').value;

            // Simple hardcoded check
            if(user === "Arun" && pass === "123") {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainUI').style.display = 'block';
            } else {
                alert("Incorrect username or password!");
            }
        }
    </script>
</body>
</html>
