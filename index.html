<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THANIMA MDS | Console</title>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f1f5f9;
            --success: #10b981; --danger: #ef4444; --muted: #94a3b8;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        body { background: var(--bg); color: var(--text); padding-bottom: 70px; }

        /* Mobile-First Navigation */
        .nav-bar {
            position: fixed; bottom: 0; width: 100%; display: flex; justify-content: space-around;
            background: #020617; padding: 15px; border-top: 1px solid #334155; z-index: 100;
        }
        .nav-item { color: var(--muted); cursor: pointer; font-size: 0.8rem; text-align: center; }
        .nav-item.active { color: var(--accent); }

        .container { padding: 20px; max-width: 600px; margin: auto; }
        .panel { background: var(--card); padding: 20px; border-radius: 16px; margin-bottom: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3); }
        
        input, select {
            width: 100%; padding: 14px; background: #334155; border: 1px solid #475569;
            border-radius: 10px; color: white; font-size: 16px; margin-top: 8px;
        }
        .btn {
            width: 100%; padding: 16px; border: none; border-radius: 10px; font-weight: bold;
            margin-top: 10px; cursor: pointer; background: var(--accent); color: #000;
        }
        
        .tab-page { display: none; }
        .tab-page.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .receipt-preview { background: #fff; color: #000; padding: 20px; border-radius: 8px; border: 2px dashed var(--accent); }
    </style>
</head>
<body>

    <div id="loginScreen" style="display:flex; height: 100vh; align-items:center; justify-content:center; padding:20px;">
        <div class="panel" style="width: 100%;">
            <h2>Login</h2>
            <input type="text" id="loginUser" placeholder="Operator ID">
            <input type="password" id="loginPass" placeholder="Passcode">
            <button class="btn" onclick="handleAuth()">Enter System</button>
        </div>
    </div>

    <div id="mainUI" style="display:none;">
        <div class="container">
            <header style="margin: 20px 0;">
                <h1 style="color: var(--accent); font-size: 1.5rem;">THANIMA MDS</h1>
                <p style="color: var(--muted);">Institutional Console</p>
            </header>

            <div id="tab-billing" class="tab-page active">
                <div class="panel">
                    <label>Student Name</label>
                    <input type="text" id="custName">
                    <label>Amount (₹)</label>
                    <input type="number" id="amount">
                    <button class="btn" onclick="sendWhatsApp()">Dispatch Receipt</button>
                </div>
            </div>

            <div id="tab-students" class="tab-page">
                <div class="panel" id="historyList"></div>
            </div>
        </div>

        <nav class="nav-bar">
            <div class="nav-item active" onclick="switchTab('billing')">🧾 Billing</div>
            <div class="nav-item" onclick="switchTab('students')">📁 Archive</div>
        </nav>
    </div>

    <script>
        function handleAuth() {
            if(document.getElementById('loginUser').value === 'Arun' && document.getElementById('loginPass').value === '123') {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('mainUI').style.display = 'block';
            } else alert('Invalid Credentials');
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-page').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function sendWhatsApp() {
            const name = document.getElementById('custName').value;
            const amount = document.getElementById('amount').value;
            if(!name || !amount) return alert('Fill all fields');
            
            const msg = `Receipt for ${name}. Amount: ₹${amount}. Thank you!`;
            window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`, '_blank');
        }
    </script>
</body>
</html>
